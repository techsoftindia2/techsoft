<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Free DSA & Java Practice Quiz for CS Students | TechSoft India</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="DSA online quiz, Java programming test, ICSE computer quiz, BCA MCA entrance practice, TechSoft coding quiz" name="keywords">
    <meta content="Test your coding skills with our free interactive quiz. Practice Data Structures, Algorithms, Java, and Python questions designed for BTech and MCA placements." name="description">

    <!-- Favicon -->
    <link href="img/logo.png" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="css/mystyle.css">

    <style>
        .code-snippet-container {
            /* background-color: #1e1e1e; */
            /* background-color: #383B40; */
            background-color: #fff;
            /* color:#383B40; */
            border-radius: 10px;
            border: 1px solid rgb(101, 101, 101);
            /* box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(40, 120, 235, 0.15); */
            margin: 20px 0;
            overflow: hidden;
        }
        .code-snippet-container pre {
            font-family: 'Consolas', 'Monaco', 'Andale Mono', 'Ubuntu Mono', monospace;
            line-height: 1.6;
            tab-size: 4;
            background-color: transparent !important;
            margin: 0 !important;
            padding: 1.25rem !important;
            color: #303236 !important;
        }
        .code-snippet-container code {  
            text-shadow: none !important;
        }
                .tag-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 123, 255, 0.1);
            color: #007bff;
            border-radius: 50px;
            padding: 2px 10px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 10px;
            transition: all 0.3s ease;
        }
        .btn-outline-primary:hover .tag-badge {
            background: #fff;
            color: #007bff;
        }
    </style>
</head>

<body>
    <!-- Dynamic Header -->
    <div id="header-placeholder"></div>

    <!-- Header Start -->
    <div class="jumbotron jumbotron-fluid position-relative overlay-bottom" style="margin-bottom: 0;">
        <div class="container text-center my-5 py-5">
            <h1 class="text-white display-4">Coding Quiz</h1>
            <p class="text-white">Challenge yourself and test your knowledge!</p>
        </div>
    </div>

    <div class="container py-5">
        <div class="quiz-card">
            <!-- Category Selection View -->
            <div id="category-selection">
                <h2 class="text-center font-weight-bold mb-4">Choose a Quiz Category</h2>
                <!-- Category Search Bar -->
                <div class="row justify-content-center mb-4">
                    <div class="col-md-6 col-lg-5">
                        <div class="input-group shadow-sm">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-white border-right-0"><i class="fas fa-search text-primary"></i></span>
                            </div>
                            <input type="text" id="category-search" class="form-control border-left-0" placeholder="Search topics (e.g. Array, Stack, Java)...">
                        </div>
                    </div>
                </div>
                <div id="category-buttons" class="d-flex flex-wrap justify-content-center">
                    <!-- Buttons generated via JS -->
                </div>
            </div>

            <!-- Quiz Content View (Initially Hidden) -->
            <div id="quiz-content" style="display: none;">
                <!-- Progress Bar -->
                <div class="progress mb-4" style="height: 10px; border-radius: 5px;">
                    <div id="quiz-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span id="quiz-category-label" class="badge badge-primary px-3 py-2 text-uppercase"></span>
                    <button class="btn btn-sm btn-outline-secondary" onclick="location.reload()">Back to Categories</button>
                </div>
                <div id="quiz-counter" class="text-primary font-weight-bold mb-1 small text-uppercase"></div>
                <h2 id="quiz-question" class="font-weight-bold mb-4">Question loading...</h2>
                <div id="quiz-options"></div>
                <div id="quiz-feedback" class="mt-4 text-center h5" style="min-height: 1.5em;"></div>
                <div class="text-right mt-4">
                    <button id="next-btn" class="btn btn-primary px-4 py-2" style="display: none;">Next Question <i class="fas fa-arrow-right ml-2"></i></button>
                </div>      
            </div>
        </div>
    </div>

    <!-- Dynamic Footer -->
    <div id="footer-placeholder"></div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module" src="js/quiz.js"></script>
    <script>
        $(function(){
          $("#header-placeholder").load("header.html");
          $("#footer-placeholder").load("footer.html");
        });
    </script>
</body>
</html>
